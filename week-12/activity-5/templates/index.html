<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h2>BMI Calculator</h2>
        <p class="subtitle">Enter your weight and height to calculate your BMI</p>

        <!-- Form posts weight and height to /calculate -->
        <form action="/calculate" method="POST">
            <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" name="weight" step="any" min="1" placeholder="e.g. 70" required>
            </div>

            <div class="form-group">
                <label for="height">Height (m)</label>
                <input type="number" id="height" name="height" step="any" min="0.1" placeholder="e.g. 1.75" required>
            </div>

            <button type="submit" class="btn">Calculate BMI</button>
        </form>
    </div>
</body>
</html>
